name: Feature Request
description: Suggest a new skill, agent capability, or plugin improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the actual failure or gap. "I tried X and it did Y instead of Z."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New skill
        - Agent prompt improvement
        - New MCP integration
        - New pipeline stage
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you think about?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Real-world use case, links to relevant resources, similar patterns elsewhere
