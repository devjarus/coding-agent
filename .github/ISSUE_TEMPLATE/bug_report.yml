name: Bug Report
description: Report a bug or unexpected agent behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below so we can reproduce it.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the unexpected behavior
    validations:
      required: true

  - type: textarea
    id: prompt
    attributes:
      label: The prompt you gave
      description: The exact user message that triggered this behavior
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: What did you think would happen?
    validations:
      required: true

  - type: textarea
    id: agent-log
    attributes:
      label: Agent log
      description: Contents of `.coding-agent/agent-log.txt` (dispatch sequence)
      render: text

  - type: textarea
    id: artifacts
    attributes:
      label: Relevant artifacts
      description: Any relevant content from spec.md, plan.md, review.md, etc.
      render: markdown

  - type: dropdown
    id: affected-agent
    attributes:
      label: Which agent misbehaved?
      options:
        - orchestrator
        - architect
        - implementor
        - evaluator
        - debugger
        - not sure

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      description: From .claude-plugin/plugin.json
      placeholder: "1.0.0"

  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      description: Run `claude --version`
